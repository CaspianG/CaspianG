<svg width="1440" height="430" viewBox="0 0 1440 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WaveMind adaptive memory loop</title>
  <desc id="desc">A white minimal diagram showing remember, store, search, adapt, and recall stages.</desc>
  <rect x="1.5" y="1.5" width="1437" height="427" rx="32.5" fill="#FFFFFF" stroke="#D6D8DE" stroke-width="3"/>
  <text x="72" y="92" fill="#090A0C" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="40" font-weight="850">WaveMind in one loop</text>
  <text x="72" y="122" fill="#555963" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">The index finds candidates. The memory field changes what stays important over time.</text>

  <g transform="translate(72 162)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="0" y="0" width="180" height="146" rx="24" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="28" y="50" fill="#111111" font-size="24" font-weight="850">Remember</text>
    <text x="28" y="86" fill="#555963" font-size="15">facts</text>
    <text x="28" y="112" fill="#555963" font-size="15">metadata</text>
    <text x="28" y="138" fill="#555963" font-size="15">namespace</text>

    <path d="M208 73H258M258 73L242 58M258 73L242 88" stroke="#111111" stroke-width="3"/>

    <rect x="276" y="0" width="180" height="146" rx="24" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="304" y="50" fill="#111111" font-size="24" font-weight="850">Store</text>
    <text x="304" y="86" fill="#555963" font-size="15">SQLite</text>
    <text x="304" y="112" fill="#555963" font-size="15">TTL</text>
    <text x="304" y="138" fill="#555963" font-size="15">tags</text>

    <path d="M484 73H534M534 73L518 58M534 73L518 88" stroke="#111111" stroke-width="3"/>

    <rect x="552" y="0" width="192" height="146" rx="24" fill="#111111"/>
    <text x="580" y="50" fill="#FFFFFF" font-size="24" font-weight="850">Search</text>
    <text x="580" y="86" fill="#C9CCD3" font-size="15">ANN / exact</text>
    <text x="580" y="112" fill="#C9CCD3" font-size="15">top-k</text>
    <text x="580" y="138" fill="#C9CCD3" font-size="15">candidates</text>

    <path d="M772 73H822M822 73L806 58M822 73L806 88" stroke="#111111" stroke-width="3"/>

    <rect x="840" y="0" width="180" height="146" rx="24" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="868" y="50" fill="#111111" font-size="24" font-weight="850">Adapt</text>
    <text x="868" y="86" fill="#555963" font-size="15">hotness</text>
    <text x="868" y="112" fill="#555963" font-size="15">decay</text>
    <text x="868" y="138" fill="#555963" font-size="15">feedback</text>

    <path d="M1048 73H1098M1098 73L1082 58M1098 73L1082 88" stroke="#111111" stroke-width="3"/>

    <rect x="1116" y="0" width="180" height="146" rx="24" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="1144" y="50" fill="#111111" font-size="24" font-weight="850">Recall</text>
    <text x="1144" y="86" fill="#555963" font-size="15">ranked</text>
    <text x="1144" y="112" fill="#555963" font-size="15">explained</text>
    <text x="1144" y="138" fill="#555963" font-size="15">scoped</text>
  </g>

  <path d="M244 392C404 300 996 300 1166 392" stroke="#A6A9B1" stroke-width="2.5"/>
  <text x="720" y="391" text-anchor="middle" fill="#555963" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="750">useful memory gains priority; stale or corrected memory fades</text>
</svg>
