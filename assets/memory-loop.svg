<svg width="1440" height="430" viewBox="0 0 1440 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WaveMind memory loop</title>
  <desc id="desc">A minimal diagram showing how WaveMind combines durable storage, candidate search, memory state, and feedback.</desc>

  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1440" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F6F8FB"/>
    </linearGradient>
    <filter id="softShadow" x="-8%" y="-16%" width="116%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#050505" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="1.5" y="1.5" width="1437" height="427" rx="36.5" fill="url(#paper)" stroke="#D8DEE8" stroke-width="3"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="72" y="78" fill="#050505" font-size="42" font-weight="950">Vector search retrieves. Memory state decides.</text>
    <text x="74" y="118" fill="#596273" font-size="18" font-weight="720">WaveMind keeps a simple durable store, then adds behavior: priority, decay, feedback, TTL, namespaces, and graph links.</text>

    <g transform="translate(72 174)" filter="url(#softShadow)">
      <g>
        <rect width="254" height="132" rx="26" fill="#FFFFFF" stroke="#DCE2EC" stroke-width="2"/>
        <text x="30" y="46" fill="#050505" font-size="23" font-weight="950">Store</text>
        <text x="30" y="82" fill="#586273" font-size="15" font-weight="760">texts, vectors, metadata</text>
        <text x="30" y="108" fill="#7A8392" font-size="14" font-weight="680">SQLite / Postgres</text>
      </g>

      <path d="M292 66H352M352 66L335 49M352 66L335 83" stroke="#050505" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>

      <g transform="translate(392)">
        <rect width="254" height="132" rx="26" fill="#FFFFFF" stroke="#DCE2EC" stroke-width="2"/>
        <text x="30" y="46" fill="#050505" font-size="23" font-weight="950">Search</text>
        <text x="30" y="82" fill="#586273" font-size="15" font-weight="760">fast candidate shortlist</text>
        <text x="30" y="108" fill="#7A8392" font-size="14" font-weight="680">FAISS / Annoy / Qdrant</text>
      </g>

      <path d="M684 66H744M744 66L727 49M744 66L727 83" stroke="#050505" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>

      <g transform="translate(784)">
        <rect width="274" height="132" rx="26" fill="#050505"/>
        <text x="30" y="46" fill="#FFFFFF" font-size="23" font-weight="950">State</text>
        <text x="30" y="82" fill="#D7DDE8" font-size="15" font-weight="760">hotness, decay, corrections</text>
        <text x="30" y="108" fill="#ABB4C4" font-size="14" font-weight="680">dynamic priority layer</text>
      </g>

      <path d="M1090 66H1138M1138 66L1121 49M1138 66L1121 83" stroke="#050505" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>

      <g transform="translate(1170)">
        <rect width="158" height="132" rx="26" fill="#FFFFFF" stroke="#DCE2EC" stroke-width="2"/>
        <text x="79" y="48" text-anchor="middle" fill="#050505" font-size="23" font-weight="950">Recall</text>
        <text x="79" y="82" text-anchor="middle" fill="#586273" font-size="15" font-weight="760">ranked</text>
        <text x="79" y="108" text-anchor="middle" fill="#586273" font-size="15" font-weight="760">explainable</text>
      </g>
    </g>

    <g transform="translate(74 354)" font-size="13" font-weight="900">
      <rect width="156" height="34" rx="17" fill="#EEF2F7"/>
      <text x="78" y="23" text-anchor="middle" fill="#303744">persistent truth</text>

      <rect x="180" width="164" height="34" rx="17" fill="#EEF2F7"/>
      <text x="262" y="23" text-anchor="middle" fill="#303744">dynamic priority</text>

      <rect x="368" width="208" height="34" rx="17" fill="#EEF2F7"/>
      <text x="472" y="23" text-anchor="middle" fill="#303744">stale fact suppression</text>

      <rect x="600" width="160" height="34" rx="17" fill="#EEF2F7"/>
      <text x="680" y="23" text-anchor="middle" fill="#303744">namespace safe</text>

      <rect x="784" width="174" height="34" rx="17" fill="#EEF2F7"/>
      <text x="871" y="23" text-anchor="middle" fill="#303744">benchmark gated</text>

      <rect x="982" width="160" height="34" rx="17" fill="#EEF2F7"/>
      <text x="1062" y="23" text-anchor="middle" fill="#303744">visible behavior</text>
    </g>
  </g>
</svg>
