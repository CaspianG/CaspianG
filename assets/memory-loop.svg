<svg width="1440" height="440" viewBox="0 0 1440 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WaveMind recall flow</title>
  <desc id="desc">A clean diagram showing static retrieval plus dynamic memory state.</desc>

  <rect x="1.5" y="1.5" width="1437" height="437" rx="34.5" fill="#FFFFFF" stroke="#DCE1EA" stroke-width="3"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="72" y="76" fill="#050505" font-size="40" font-weight="900">Static retrieval is useful. Memory needs state.</text>
    <text x="74" y="116" fill="#59616F" font-size="18" font-weight="650">WaveMind keeps storage durable, then lets recall change with time, feedback, and context.</text>
  </g>

  <g transform="translate(68 160)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="0" y="0" width="278" height="160" rx="28" fill="#F5F7FA" stroke="#D8DEE8" stroke-width="2"/>
    <text x="28" y="44" fill="#050505" font-size="23" font-weight="900">Store</text>
    <text x="28" y="82" fill="#586170" font-size="16" font-weight="750">SQLite / Postgres</text>
    <text x="28" y="116" fill="#717B89" font-size="15" font-weight="650">texts, vectors, metadata,</text>
    <text x="28" y="140" fill="#717B89" font-size="15" font-weight="650">tags, namespaces, TTL</text>

    <path d="M318 80H382M382 80L364 62M382 80L364 98" stroke="#050505" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="422" y="0" width="278" height="160" rx="28" fill="#FFFFFF" stroke="#050505" stroke-width="2"/>
    <text x="450" y="44" fill="#050505" font-size="23" font-weight="900">Search</text>
    <text x="450" y="82" fill="#586170" font-size="16" font-weight="750">vector candidates</text>
    <text x="450" y="116" fill="#717B89" font-size="15" font-weight="650">hash, sentence encoders,</text>
    <text x="450" y="140" fill="#717B89" font-size="15" font-weight="650">FAISS, Qdrant paths</text>

    <path d="M740 80H804M804 80L786 62M804 80L786 98" stroke="#050505" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="844" y="0" width="278" height="160" rx="28" fill="#050505"/>
    <text x="872" y="44" fill="#FFFFFF" font-size="23" font-weight="900">Evolve</text>
    <text x="872" y="82" fill="#D3DAE6" font-size="16" font-weight="750">memory state</text>
    <text x="872" y="116" fill="#AEB7C8" font-size="15" font-weight="650">hotness, decay, feedback,</text>
    <text x="872" y="140" fill="#AEB7C8" font-size="15" font-weight="650">graph links, corrections</text>

    <path d="M1162 80H1202M1202 80L1184 62M1202 80L1184 98" stroke="#050505" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="1222" y="0" width="130" height="160" rx="28" fill="#F5F7FA" stroke="#D8DEE8" stroke-width="2"/>
    <text x="1287" y="70" text-anchor="middle" fill="#050505" font-size="19" font-weight="900">Recall</text>
    <text x="1287" y="100" text-anchor="middle" fill="#59616F" font-size="13" font-weight="750">with</text>
    <text x="1287" y="122" text-anchor="middle" fill="#59616F" font-size="13" font-weight="750">context</text>
  </g>

  <g transform="translate(82 358)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="900">
    <rect width="218" height="44" rx="22" fill="#F2F4F8"/>
    <text x="109" y="29" text-anchor="middle" fill="#303744">durable source</text>

    <rect x="250" width="218" height="44" rx="22" fill="#F2F4F8"/>
    <text x="359" y="29" text-anchor="middle" fill="#303744">fast candidates</text>

    <rect x="500" width="230" height="44" rx="22" fill="#F2F4F8"/>
    <text x="615" y="29" text-anchor="middle" fill="#303744">dynamic priority</text>

    <rect x="762" width="214" height="44" rx="22" fill="#F2F4F8"/>
    <text x="869" y="29" text-anchor="middle" fill="#303744">explainable results</text>

    <rect x="1008" width="250" height="44" rx="22" fill="#F2F4F8"/>
    <text x="1133" y="29" text-anchor="middle" fill="#303744">production evidence</text>
  </g>
</svg>
