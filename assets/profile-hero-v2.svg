  <text x="80" y="384" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="850">systems.</text>
  <text x="84" y="428" fill="#D6D8DE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="600">local-first / inspectable / benchmarked / built for durable context</text>

  <g transform="translate(80 466)">
