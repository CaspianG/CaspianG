      <text x="166" y="36" fill="#4D515A" font-size="15" font-weight="650">facts, metadata, namespace</text>

      <rect x="0" y="72" width="440" height="56" rx="17" fill="#1D1F24" stroke="#3D414A" stroke-width="1.2"/>
      <text x="24" y="108" fill="#FFFFFF" font-size="18" font-weight="850">retrieve</text>
      <text x="166" y="108" fill="#B9BDC6" font-size="15" font-weight="650">vector candidates, top-k</text>

