<svg width="1440" height="560" viewBox="0 0 1440 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CaspianG builds adaptive memory systems</title>
  <desc id="desc">A minimal monochrome GitHub profile hero for WaveMind and adaptive memory infrastructure.</desc>

  <rect width="1440" height="560" rx="36" fill="#050505"/>
  <rect x="1.5" y="1.5" width="1437" height="557" rx="34.5" stroke="#34373E" stroke-width="3"/>

  <g opacity="0.22">
    <path d="M80 92H1360M80 186H1360M80 280H1360M80 374H1360M80 468H1360" stroke="#FFFFFF" stroke-width="1"/>
    <path d="M158 70V492M306 70V492M454 70V492M602 70V492M750 70V492M898 70V492M1046 70V492M1194 70V492M1342 70V492" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <g transform="translate(80 72)">
