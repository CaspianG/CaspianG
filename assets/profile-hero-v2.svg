    <text x="73" y="27" text-anchor="middle" fill="#050505" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="850">WaveMind</text>
    <rect x="162" y="0" width="158" height="42" rx="21" stroke="#8D929D" stroke-width="1.5"/>
    <text x="241" y="27" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">open source</text>
    <rect x="336" y="0" width="176" height="42" rx="21" stroke="#8D929D" stroke-width="1.5"/>
    <text x="424" y="27" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">memory engine</text>
  </g>

