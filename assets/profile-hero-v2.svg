    <rect x="0" y="0" width="524" height="416" rx="34" fill="#111215" stroke="#42464F" stroke-width="1.5"/>
    <text x="42" y="70" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="850">WaveMind</text>
    <text x="42" y="101" fill="#C8CBD2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="650">memory that changes with use</text>

    <g transform="translate(42 132)" font-family="Inter, Segoe UI, Arial, sans-serif">
