      <g transform="translate(34 358)" font-size="12" font-weight="900">
        <rect width="78" height="36" rx="18" fill="#FFFFFF"/>
        <text x="39" y="24" text-anchor="middle" fill="#050505">hotness</text>

        <rect x="88" width="64" height="36" rx="18" fill="#151922" stroke="#596274" stroke-width="1.1"/>
        <text x="120" y="24" text-anchor="middle" fill="#FFFFFF">decay</text>

        <rect x="162" width="54" height="36" rx="18" fill="#151922" stroke="#596274" stroke-width="1.1"/>
        <text x="189" y="24" text-anchor="middle" fill="#FFFFFF">TTL</text>

        <rect x="226" width="66" height="36" rx="18" fill="#151922" stroke="#596274" stroke-width="1.1"/>
        <text x="259" y="24" text-anchor="middle" fill="#FFFFFF">graph</text>

