<svg width="1440" height="620" viewBox="0 0 1440 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CaspianG builds dynamic memory infrastructure</title>
  <desc id="desc">A clean monochrome banner for WaveMind and dynamic software memory.</desc>

  <rect width="1440" height="620" rx="44" fill="#FFFFFF"/>
  <rect x="1.5" y="1.5" width="1437" height="617" rx="42.5" stroke="#D9DEE8" stroke-width="3"/>

  <g opacity="0.84">
    <path d="M88 112H1352" stroke="#EFF2F6" stroke-width="2"/>
