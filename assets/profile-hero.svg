        <text x="0" y="57" fill="#FFFFFF" font-size="34" font-weight="900">memory field</text>
        <text x="0" y="88" fill="#C8D0DC" font-size="16" font-weight="650">Search finds candidates.</text>
        <text x="0" y="114" fill="#C8D0DC" font-size="16" font-weight="650">State decides what should matter now.</text>
      </g>

      <g transform="translate(78 160)">
        <circle cx="130" cy="130" r="114" stroke="#FFFFFF" stroke-width="1.4" opacity="0.10"/>
        <circle cx="130" cy="130" r="84" stroke="#FFFFFF" stroke-width="1.4" opacity="0.17"/>
