      <text x="77" y="28" text-anchor="middle" fill="#050505" font-size="14" font-weight="900" letter-spacing="1.8">CASPIANG</text>

      <text x="0" y="128" fill="#FFFFFF" font-size="72" font-weight="900">Adaptive memory</text>
      <text x="0" y="204" fill="#FFFFFF" font-size="72" font-weight="900">systems</text>

      <text x="2" y="270" fill="#E7ECF4" font-size="25" font-weight="750">Building WaveMind: local-first memory infrastructure</text>
      <text x="2" y="309" fill="#AEB7C5" font-size="21" font-weight="650">for software that has to remember, forget, adapt, and explain.</text>

      <g transform="translate(0 368)">
        <rect width="176" height="54" rx="27" fill="#FFFFFF"/>
        <text x="88" y="35" text-anchor="middle" fill="#050505" font-size="15" font-weight="900">WaveMind</text>

