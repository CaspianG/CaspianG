  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(92 78)">
      <rect width="150" height="40" rx="20" fill="#050505"/>
      <text x="75" y="26" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="900" letter-spacing="2">CASPIANG</text>

      <text x="0" y="138" fill="#050505" font-size="82" font-weight="900">Dynamic memory</text>
      <text x="0" y="218" fill="#050505" font-size="82" font-weight="900">for software</text>

      <text x="4" y="286" fill="#222733" font-size="25" font-weight="800">Local-first systems that remember, forget, adapt, and explain.</text>
      <text x="4" y="324" fill="#667085" font-size="19" font-weight="650">WaveMind turns retrieval into stateful, auditable memory.</text>

      <g transform="translate(0 388)" font-size="14" font-weight="900">
        <rect width="138" height="48" rx="24" fill="#050505"/>
        <text x="69" y="31" text-anchor="middle" fill="#FFFFFF">WaveMind</text>

        <rect x="154" width="126" height="48" rx="24" fill="#FFFFFF" stroke="#B9C0CC" stroke-width="1.4"/>
        <text x="217" y="31" text-anchor="middle" fill="#050505">local-first</text>

        <rect x="296" width="148" height="48" rx="24" fill="#FFFFFF" stroke="#B9C0CC" stroke-width="1.4"/>
        <text x="370" y="31" text-anchor="middle" fill="#050505">benchmarked</text>

        <rect x="460" width="120" height="48" rx="24" fill="#FFFFFF" stroke="#B9C0CC" stroke-width="1.4"/>
        <text x="520" y="31" text-anchor="middle" fill="#050505">open API</text>
      </g>
    </g>

    <g transform="translate(890 76)">
      <rect width="408" height="408" rx="34" fill="#050505"/>
      <rect x="1.5" y="1.5" width="405" height="405" rx="32.5" stroke="#303744" stroke-width="3"/>

      <g transform="translate(44 42)">
        <text x="0" y="20" fill="#A9B2C2" font-size="13" font-weight="900" letter-spacing="2">MEMORY FIELD</text>
        <text x="0" y="58" fill="#FFFFFF" font-size="32" font-weight="900">stateful recall</text>
        <text x="0" y="91" fill="#C8D0DC" font-size="16" font-weight="650">Search brings candidates in.</text>
        <text x="0" y="117" fill="#C8D0DC" font-size="16" font-weight="650">Memory state decides what matters.</text>
      </g>

      <g transform="matrix(0.82 0 0 0.82 84 194)">
