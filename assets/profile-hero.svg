<svg width="1440" height="560" viewBox="0 0 1440 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CaspianG builds adaptive memory systems</title>
  <desc id="desc">A monochrome GitHub profile banner showing WaveMind as durable storage, retrieval, memory state, and explanation.</desc>

  <rect width="1440" height="560" rx="40" fill="#050505"/>
  <rect x="1.5" y="1.5" width="1437" height="557" rx="38.5" stroke="#292D36" stroke-width="3"/>

