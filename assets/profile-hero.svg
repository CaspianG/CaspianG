  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(90 74)">
      <rect width="154" height="42" rx="21" fill="#050505"/>
      <text x="77" y="27" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="900" letter-spacing="2.2">CASPIANG</text>

      <text x="0" y="138" fill="#050505" font-size="72" font-weight="900">Memory systems</text>
      <text x="0" y="214" fill="#050505" font-size="72" font-weight="900">that stay useful</text>
      <text x="0" y="290" fill="#050505" font-size="72" font-weight="900">over time.</text>

      <text x="4" y="344" fill="#222733" font-size="24" font-weight="800">WaveMind turns retrieval into stateful, auditable memory.</text>
      <text x="4" y="382" fill="#667085" font-size="18" font-weight="650">Local-first. Benchmarked. Built for software with long timelines.</text>

      <g transform="translate(0 426)" font-size="13" font-weight="900">
        <rect width="124" height="44" rx="22" fill="#050505"/>
        <text x="62" y="29" text-anchor="middle" fill="#FFFFFF">remember</text>

        <rect x="138" width="104" height="44" rx="22" fill="#FFFFFF" stroke="#B7BFCC" stroke-width="1.5"/>
        <text x="190" y="29" text-anchor="middle" fill="#050505">update</text>

        <rect x="256" width="102" height="44" rx="22" fill="#FFFFFF" stroke="#B7BFCC" stroke-width="1.5"/>
        <text x="307" y="29" text-anchor="middle" fill="#050505">forget</text>

        <rect x="372" width="112" height="44" rx="22" fill="#FFFFFF" stroke="#B7BFCC" stroke-width="1.5"/>
        <text x="428" y="29" text-anchor="middle" fill="#050505">explain</text>
