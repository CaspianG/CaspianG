  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(96 78)">
      <rect width="160" height="42" rx="21" fill="#050505"/>
      <text x="80" y="27" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="900" letter-spacing="2.2">CASPIANG</text>

      <text x="0" y="132" fill="#050505" font-size="64" font-weight="900">Dynamic memory</text>
      <text x="0" y="202" fill="#050505" font-size="64" font-weight="900">for software with</text>
      <text x="0" y="272" fill="#050505" font-size="64" font-weight="900">long timelines.</text>

      <text x="4" y="338" fill="#222733" font-size="23" font-weight="800">WaveMind makes recall stateful, auditable, and useful over time.</text>
      <text x="4" y="376" fill="#667085" font-size="18" font-weight="650">Local-first infrastructure for memory that can strengthen, fade, update, and explain.</text>

      <g transform="translate(0 430)" font-size="13" font-weight="900">
        <rect width="116" height="42" rx="21" fill="#050505"/>
        <text x="58" y="27" text-anchor="middle" fill="#FFFFFF">local-first</text>

        <rect x="132" width="132" height="42" rx="21" fill="#FFFFFF" stroke="#B7BFCC" stroke-width="1.5"/>
        <text x="198" y="27" text-anchor="middle" fill="#050505">benchmarked</text>

        <rect x="280" width="112" height="42" rx="21" fill="#FFFFFF" stroke="#B7BFCC" stroke-width="1.5"/>
        <text x="336" y="27" text-anchor="middle" fill="#050505">explainable</text>

        <rect x="408" width="126" height="42" rx="21" fill="#FFFFFF" stroke="#B7BFCC" stroke-width="1.5"/>
        <text x="471" y="27" text-anchor="middle" fill="#050505">production path</text>
      </g>
    </g>

    <g transform="translate(900 70)">
      <rect width="416" height="420" rx="38" fill="#050505"/>
      <rect x="1.5" y="1.5" width="413" height="417" rx="36.5" stroke="#303745" stroke-width="3"/>

      <g transform="translate(36 34)">
