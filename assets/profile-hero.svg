        <text x="270" y="35" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="850">Local-first</text>

        <rect x="370" width="164" height="54" rx="27" fill="#10131A" stroke="#687180" stroke-width="1.2"/>
        <text x="452" y="35" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="850">Benchmarked</text>

