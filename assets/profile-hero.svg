<svg width="1440" height="560" viewBox="0 0 1440 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CaspianG builds adaptive memory infrastructure</title>
  <desc id="desc">A minimal black and white GitHub profile banner for CaspianG and WaveMind.</desc>

  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#ECEFF4" stroke-width="1"/>
    </pattern>
    <filter id="panelShadow" x="-8%" y="-10%" width="116%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#050505" flood-opacity="0.16"/>
    </filter>
    <filter id="chipShadow" x="-30%" y="-50%" width="160%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#050505" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1440" height="560" rx="42" fill="#FFFFFF"/>
  <rect x="1.5" y="1.5" width="1437" height="557" rx="40.5" stroke="#D9DEE7" stroke-width="3"/>
  <rect x="32" y="32" width="1376" height="496" rx="32" fill="url(#grid)"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(86 76)">
      <rect width="150" height="38" rx="19" fill="#050505"/>
      <text x="75" y="25" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="900" letter-spacing="2">CASPIANG</text>

      <text x="0" y="122" fill="#050505" font-size="74" font-weight="950">Memory systems</text>
      <text x="0" y="202" fill="#050505" font-size="74" font-weight="950">that adapt.</text>

      <text x="2" y="274" fill="#303744" font-size="24" font-weight="760">Building WaveMind: local-first infrastructure</text>
      <text x="2" y="310" fill="#303744" font-size="24" font-weight="760">for software that remembers, forgets, and evolves.</text>

      <g transform="translate(0 374)" font-size="13" font-weight="900" filter="url(#chipShadow)">
        <rect width="126" height="40" rx="20" fill="#050505"/>
        <text x="63" y="26" text-anchor="middle" fill="#FFFFFF">WaveMind</text>

        <rect x="142" width="116" height="40" rx="20" fill="#FFFFFF" stroke="#BBC3D0" stroke-width="1.5"/>
        <text x="200" y="26" text-anchor="middle" fill="#050505">local-first</text>

        <rect x="274" width="142" height="40" rx="20" fill="#FFFFFF" stroke="#BBC3D0" stroke-width="1.5"/>
        <text x="345" y="26" text-anchor="middle" fill="#050505">dynamic recall</text>

        <rect x="432" width="124" height="40" rx="20" fill="#FFFFFF" stroke="#BBC3D0" stroke-width="1.5"/>
        <text x="494" y="26" text-anchor="middle" fill="#050505">benchmarks</text>
      </g>
    </g>

    <g transform="translate(894 72)" filter="url(#panelShadow)">
      <rect width="432" height="418" rx="34" fill="#050505"/>
      <rect x="1.5" y="1.5" width="429" height="415" rx="32.5" stroke="#303744" stroke-width="3"/>

      <text x="40" y="60" fill="#AEB8C8" font-size="12" font-weight="900" letter-spacing="2">WAVEMIND LOOP</text>
      <text x="40" y="110" fill="#FFFFFF" font-size="31" font-weight="950">search is not memory</text>
      <text x="40" y="150" fill="#FFFFFF" font-size="31" font-weight="950">state changes recall</text>

      <g transform="translate(48 204)">
        <circle cx="42" cy="42" r="42" fill="#FFFFFF"/>
        <circle cx="168" cy="42" r="42" fill="#171D27" stroke="#747E8E" stroke-width="2"/>
        <circle cx="294" cy="42" r="42" fill="#FFFFFF"/>

        <path d="M92 42H118M118 42L104 28M118 42L104 56" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M218 42H244M244 42L230 28M244 42L230 56" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

        <text x="42" y="39" text-anchor="middle" fill="#050505" font-size="12" font-weight="950">store</text>
        <text x="42" y="57" text-anchor="middle" fill="#596273" font-size="10" font-weight="900">truth</text>

        <text x="168" y="39" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="950">field</text>
        <text x="168" y="57" text-anchor="middle" fill="#AEB8C8" font-size="10" font-weight="900">state</text>

        <text x="294" y="39" text-anchor="middle" fill="#050505" font-size="12" font-weight="950">recall</text>
        <text x="294" y="57" text-anchor="middle" fill="#596273" font-size="10" font-weight="900">ranked</text>
      </g>

      <g transform="translate(40 326)" font-size="12" font-weight="900">
        <rect width="112" height="34" rx="17" fill="#171D27" stroke="#747E8E" stroke-width="1.2"/>
        <text x="56" y="22" text-anchor="middle" fill="#FFFFFF">hotness</text>

        <rect x="126" width="80" height="34" rx="17" fill="#171D27" stroke="#747E8E" stroke-width="1.2"/>
        <text x="166" y="22" text-anchor="middle" fill="#FFFFFF">decay</text>

        <rect x="220" width="86" height="34" rx="17" fill="#171D27" stroke="#747E8E" stroke-width="1.2"/>
        <text x="263" y="22" text-anchor="middle" fill="#FFFFFF">TTL</text>

        <rect x="320" width="64" height="34" rx="17" fill="#FFFFFF"/>
        <text x="352" y="22" text-anchor="middle" fill="#050505">API</text>
      </g>
    </g>
  </g>
</svg>
