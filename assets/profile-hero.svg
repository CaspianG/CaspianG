<svg width="1440" height="560" viewBox="0 0 1440 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CaspianG builds adaptive memory systems</title>
  <desc id="desc">A minimalist monochrome banner for CaspianG and WaveMind, showing adaptive memory as a system of retrieval, state, and explainable recall.</desc>

  <rect width="1440" height="560" rx="44" fill="#050505"/>
  <rect x="1.5" y="1.5" width="1437" height="557" rx="42.5" stroke="#242832" stroke-width="3"/>

  <g opacity="0.08" stroke="#FFFFFF" stroke-width="1">
    <path d="M92 88H1348M92 168H1348M92 248H1348M92 328H1348M92 408H1348M92 488H1348"/>
    <path d="M180 72V488M300 72V488M420 72V488M540 72V488M660 72V488M780 72V488M900 72V488M1020 72V488M1140 72V488M1260 72V488"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
