<svg width="1440" height="560" viewBox="0 0 1440 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CaspianG builds dynamic memory infrastructure</title>
  <desc id="desc">A modern monochrome GitHub profile banner for WaveMind and dynamic memory infrastructure.</desc>

  <rect width="1440" height="560" rx="44" fill="#FFFFFF"/>
  <rect x="1.5" y="1.5" width="1437" height="557" rx="42.5" stroke="#D8DEE8" stroke-width="3"/>

  <g opacity="0.7">
    <path d="M88 96H1352" stroke="#EEF1F5" stroke-width="2"/>
    <path d="M88 176H1352" stroke="#EEF1F5" stroke-width="2"/>
    <path d="M88 256H1352" stroke="#EEF1F5" stroke-width="2"/>
    <path d="M88 336H1352" stroke="#EEF1F5" stroke-width="2"/>
    <path d="M88 416H1352" stroke="#EEF1F5" stroke-width="2"/>
