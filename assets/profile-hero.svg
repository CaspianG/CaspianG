<svg width="1440" height="560" viewBox="0 0 1440 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CaspianG builds adaptive memory systems</title>
  <desc id="desc">A minimal black and white profile banner for WaveMind and adaptive software memory.</desc>

  <defs>
    <pattern id="dotGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.15" fill="#D6DCE6"/>
    </pattern>
    <linearGradient id="cardShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="128%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#050505" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1440" height="560" rx="44" fill="#FFFFFF"/>
  <rect x="1.5" y="1.5" width="1437" height="557" rx="42.5" stroke="#D8DEE8" stroke-width="3"/>
  <rect x="36" y="36" width="1368" height="488" rx="36" fill="url(#dotGrid)"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(92 82)">
      <rect width="146" height="38" rx="19" fill="#050505"/>
      <text x="73" y="25" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="900" letter-spacing="2">CASPIANG</text>

      <text x="0" y="128" fill="#050505" font-size="76" font-weight="950">Software memory</text>
      <text x="0" y="212" fill="#050505" font-size="76" font-weight="950">with state.</text>

      <text x="2" y="286" fill="#303744" font-size="25" font-weight="760">Building WaveMind: local-first infrastructure</text>
      <text x="2" y="322" fill="#303744" font-size="25" font-weight="760">for context that remembers, fades, and adapts.</text>

      <g transform="translate(0 384)" font-size="13" font-weight="900">
        <rect width="132" height="42" rx="21" fill="#050505"/>
        <text x="66" y="27" text-anchor="middle" fill="#FFFFFF">WaveMind</text>

        <rect x="148" width="112" height="42" rx="21" fill="#FFFFFF" stroke="#B8C1CF" stroke-width="1.5"/>
        <text x="204" y="27" text-anchor="middle" fill="#050505">hotness</text>

        <rect x="276" width="96" height="42" rx="21" fill="#FFFFFF" stroke="#B8C1CF" stroke-width="1.5"/>
        <text x="324" y="27" text-anchor="middle" fill="#050505">decay</text>

        <rect x="388" width="104" height="42" rx="21" fill="#FFFFFF" stroke="#B8C1CF" stroke-width="1.5"/>
        <text x="440" y="27" text-anchor="middle" fill="#050505">TTL</text>

        <rect x="508" width="142" height="42" rx="21" fill="#FFFFFF" stroke="#B8C1CF" stroke-width="1.5"/>
        <text x="579" y="27" text-anchor="middle" fill="#050505">benchmarks</text>
      </g>
    </g>

    <g transform="translate(914 76)" filter="url(#shadow)">
      <rect width="412" height="408" rx="34" fill="url(#cardShade)"/>
      <rect x="1.5" y="1.5" width="409" height="405" rx="32.5" stroke="#303744" stroke-width="3"/>

      <text x="38" y="58" fill="#AEB8C8" font-size="12" font-weight="900" letter-spacing="2">ADAPTIVE MEMORY</text>
      <text x="38" y="118" fill="#FFFFFF" font-size="34" font-weight="950">search</text>
      <text x="38" y="160" fill="#FFFFFF" font-size="34" font-weight="950">is only the start</text>

      <g transform="translate(48 214)">
        <circle cx="32" cy="32" r="32" fill="#FFFFFF"/>
        <circle cx="156" cy="32" r="32" fill="#171D27" stroke="#6B7280" stroke-width="1.6"/>
        <circle cx="280" cy="32" r="32" fill="#FFFFFF"/>

        <path d="M72 32H112" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
        <path d="M102 20L114 32L102 44" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M196 32H236" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
        <path d="M226 20L238 32L226 44" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

        <text x="32" y="37" text-anchor="middle" fill="#050505" font-size="12" font-weight="950">store</text>
        <text x="156" y="37" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="950">field</text>
        <text x="280" y="37" text-anchor="middle" fill="#050505" font-size="12" font-weight="950">recall</text>
      </g>

      <g transform="translate(38 324)" font-size="12" font-weight="900">
        <rect width="104" height="34" rx="17" fill="#171D27" stroke="#6B7280" stroke-width="1.2"/>
        <text x="52" y="22" text-anchor="middle" fill="#FFFFFF">namespaces</text>
        <rect x="118" width="94" height="34" rx="17" fill="#171D27" stroke="#6B7280" stroke-width="1.2"/>
        <text x="165" y="22" text-anchor="middle" fill="#FFFFFF">feedback</text>
        <rect x="226" width="76" height="34" rx="17" fill="#171D27" stroke="#6B7280" stroke-width="1.2"/>
        <text x="264" y="22" text-anchor="middle" fill="#FFFFFF">graph</text>
        <rect x="306" width="58" height="34" rx="17" fill="#FFFFFF"/>
        <text x="335" y="22" text-anchor="middle" fill="#050505">API</text>
      </g>
    </g>
  </g>
</svg>
