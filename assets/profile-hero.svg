      <g transform="translate(42 374)" font-size="12" font-weight="900">
        <rect width="76" height="36" rx="18" fill="#FFFFFF"/>
        <text x="38" y="24" text-anchor="middle" fill="#050505">store</text>

        <rect x="88" width="84" height="36" rx="18" fill="#151922" stroke="#5C6676" stroke-width="1.1"/>
        <text x="130" y="24" text-anchor="middle" fill="#FFFFFF">retrieve</text>

        <rect x="184" width="76" height="36" rx="18" fill="#151922" stroke="#5C6676" stroke-width="1.1"/>
        <text x="222" y="24" text-anchor="middle" fill="#FFFFFF">evolve</text>

        <rect x="272" width="82" height="36" rx="18" fill="#151922" stroke="#5C6676" stroke-width="1.1"/>
