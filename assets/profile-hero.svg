  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(94 78)">
      <rect width="162" height="42" rx="21" fill="#050505"/>
      <text x="81" y="27" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="900" letter-spacing="2.4">CASPIANG</text>

      <text x="0" y="134" fill="#050505" font-size="68" font-weight="900">Memory</text>
      <text x="0" y="208" fill="#050505" font-size="68" font-weight="900">infrastructure</text>
      <text x="0" y="282" fill="#050505" font-size="68" font-weight="900">for long-running</text>
      <text x="0" y="356" fill="#050505" font-size="68" font-weight="900">software.</text>

      <text x="4" y="424" fill="#222733" font-size="23" font-weight="800">WaveMind makes recall stateful, auditable, and useful over time.</text>
      <text x="4" y="462" fill="#667085" font-size="18" font-weight="650">Durable storage, vector retrieval, hotness, decay, TTL, graph signals, and benchmarks.</text>

      <g transform="translate(0 486)" font-size="13" font-weight="900">
        <rect width="118" height="42" rx="21" fill="#050505"/>
        <text x="59" y="27" text-anchor="middle" fill="#FFFFFF">local-first</text>

        <rect x="134" width="132" height="42" rx="21" fill="#FFFFFF" stroke="#B7BFCC" stroke-width="1.5"/>
        <text x="200" y="27" text-anchor="middle" fill="#050505">benchmarked</text>

        <rect x="282" width="116" height="42" rx="21" fill="#FFFFFF" stroke="#B7BFCC" stroke-width="1.5"/>
        <text x="340" y="27" text-anchor="middle" fill="#050505">explainable</text>

        <rect x="414" width="136" height="42" rx="21" fill="#FFFFFF" stroke="#B7BFCC" stroke-width="1.5"/>
        <text x="482" y="27" text-anchor="middle" fill="#050505">production path</text>
      </g>
    </g>

    <g transform="translate(896 76)">
