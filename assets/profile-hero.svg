<svg width="1440" height="620" viewBox="0 0 1440 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CaspianG builds dynamic memory infrastructure</title>
  <desc id="desc">A modern monochrome GitHub profile banner for WaveMind and long-term software memory.</desc>

  <rect width="1440" height="620" rx="46" fill="#FFFFFF"/>
  <rect x="1.5" y="1.5" width="1437" height="617" rx="44.5" stroke="#D8DEE8" stroke-width="3"/>

  <g opacity="0.78">
