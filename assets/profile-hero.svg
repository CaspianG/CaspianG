        <rect x="376" width="178" height="54" rx="27" fill="#10141C" stroke="#626B79" stroke-width="1.2"/>
        <text x="465" y="35" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="850">Benchmarked</text>

