  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(88 74)">
      <rect width="154" height="42" rx="21" fill="#050505"/>
      <text x="77" y="27" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="900" letter-spacing="2.2">CASPIANG</text>

      <text x="0" y="132" fill="#050505" font-size="76" font-weight="900">Software memory,</text>
      <text x="0" y="214" fill="#050505" font-size="76" font-weight="900">made dynamic.</text>

      <text x="4" y="290" fill="#232832" font-size="24" font-weight="800">I build infrastructure for systems that need</text>
      <text x="4" y="326" fill="#232832" font-size="24" font-weight="800">to remember over time.</text>
      <text x="4" y="367" fill="#687182" font-size="18" font-weight="650">Durable storage, vector retrieval, hotness, decay, TTL, graph signals, and benchmarks.</text>

      <g transform="translate(0 410)" font-size="13" font-weight="900">
        <rect width="120" height="42" rx="21" fill="#050505"/>
        <text x="60" y="27" text-anchor="middle" fill="#FFFFFF">local-first</text>

        <rect x="138" width="126" height="42" rx="21" fill="#FFFFFF" stroke="#B7BFCC" stroke-width="1.5"/>
        <text x="201" y="27" text-anchor="middle" fill="#050505">benchmarked</text>

        <rect x="282" width="118" height="42" rx="21" fill="#FFFFFF" stroke="#B7BFCC" stroke-width="1.5"/>
        <text x="341" y="27" text-anchor="middle" fill="#050505">observable</text>

        <rect x="418" width="140" height="42" rx="21" fill="#FFFFFF" stroke="#B7BFCC" stroke-width="1.5"/>
        <text x="488" y="27" text-anchor="middle" fill="#050505">production path</text>
      </g>

      <g transform="translate(0 460)">
        <rect width="560" height="58" rx="29" fill="#F4F6FA" stroke="#D8DEE8" stroke-width="1.5"/>
        <text x="32" y="37" fill="#050505" font-size="18" font-weight="900">WaveMind</text>
        <text x="142" y="37" fill="#59616F" font-size="16" font-weight="750">recall that can evolve, decay, and explain itself</text>
      </g>
    </g>

    <g transform="translate(876 76)">
      <rect width="452" height="468" rx="40" fill="#050505"/>
      <rect x="1.5" y="1.5" width="449" height="465" rx="38.5" stroke="#2C3442" stroke-width="3"/>

      <g transform="translate(38 38)">
