    <path d="M78 96H1362M78 176H1362M78 256H1362M78 336H1362M78 416H1362"/>
    <path d="M160 72V488M280 72V488M400 72V488M520 72V488M640 72V488M760 72V488M880 72V488M1000 72V488M1120 72V488M1240 72V488"/>
  </g>

