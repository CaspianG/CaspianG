      <text x="1" y="201" fill="#E7ECF4" font-size="42" font-weight="850">that stay useful over time</text>
      <text x="3" y="258" fill="#AAB2BF" font-size="22" font-weight="650">WaveMind gives software durable context, adaptive recall,</text>
      <text x="3" y="292" fill="#AAB2BF" font-size="22" font-weight="650">controlled forgetting, and production-grade observability.</text>

