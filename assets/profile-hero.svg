<svg width="1440" height="560" viewBox="0 0 1440 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CaspianG builds WaveMind adaptive memory infrastructure</title>
  <desc id="desc">A monochrome modern banner showing WaveMind as an adaptive memory system with durable context, recall, decay, and explainability.</desc>

  <rect width="1440" height="560" rx="42" fill="#050505"/>
  <rect x="1.5" y="1.5" width="1437" height="557" rx="40.5" stroke="#262A33" stroke-width="3"/>

  <g opacity="0.12" stroke="#FFFFFF" stroke-width="1">
    <path d="M88 96H1352M88 176H1352M88 256H1352M88 336H1352M88 416H1352M88 496H1352"/>
    <path d="M168 72V488M288 72V488M408 72V488M528 72V488M648 72V488M768 72V488M888 72V488M1008 72V488M1128 72V488M1248 72V488M1368 72V488"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
