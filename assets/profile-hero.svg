        <text x="274" y="35" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="850">Local-first</text>

        <rect x="372" width="168" height="54" rx="27" fill="#10131A" stroke="#687180" stroke-width="1.2"/>
        <text x="456" y="35" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="850">Benchmarked</text>

        <rect x="560" width="178" height="54" rx="27" fill="#10131A" stroke="#687180" stroke-width="1.2"/>
