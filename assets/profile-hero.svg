        <text x="46" y="24" text-anchor="middle" fill="#050505">remember</text>

        <rect x="104" width="74" height="36" rx="18" fill="#151922" stroke="#596274" stroke-width="1.1"/>
        <text x="141" y="24" text-anchor="middle" fill="#FFFFFF">query</text>

        <rect x="190" width="74" height="36" rx="18" fill="#151922" stroke="#596274" stroke-width="1.1"/>
        <text x="227" y="24" text-anchor="middle" fill="#FFFFFF">forget</text>

        <rect x="276" width="76" height="36" rx="18" fill="#151922" stroke="#596274" stroke-width="1.1"/>
        <text x="314" y="24" text-anchor="middle" fill="#FFFFFF">explain</text>
