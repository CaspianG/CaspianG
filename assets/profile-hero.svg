          <circle cx="130" cy="130" r="34"/>
          <circle cx="20" cy="130" r="8"/>
          <circle cx="240" cy="130" r="8"/>
          <circle cx="130" cy="20" r="7"/>
          <circle cx="76" cy="78" r="6"/>
          <circle cx="184" cy="184" r="6"/>
          <circle cx="84" cy="184" r="5"/>
