      <g transform="translate(34 386)" font-size="12" font-weight="900">
        <rect width="82" height="36" rx="18" fill="#FFFFFF"/>
        <text x="41" y="24" text-anchor="middle" fill="#050505">hotness</text>

        <rect x="92" width="66" height="36" rx="18" fill="#151922" stroke="#596274" stroke-width="1.1"/>
        <text x="125" y="24" text-anchor="middle" fill="#FFFFFF">decay</text>

        <rect x="168" width="54" height="36" rx="18" fill="#151922" stroke="#596274" stroke-width="1.1"/>
