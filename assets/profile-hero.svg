      <text x="77" y="29" text-anchor="middle" fill="#050505" font-size="14" font-weight="900" letter-spacing="2">CASPIANG</text>

      <text x="0" y="146" fill="#FFFFFF" font-size="78" font-weight="900">Dynamic memory</text>
      <text x="0" y="222" fill="#FFFFFF" font-size="78" font-weight="900">for live systems</text>

      <text x="2" y="288" fill="#F0F3F8" font-size="24" font-weight="760">Local-first systems that remember, forget, adapt, and explain.</text>
      <text x="2" y="326" fill="#AEB7C5" font-size="19" font-weight="650">WaveMind is the main project: durable storage, vector retrieval, adaptive state.</text>

