<svg width="1440" height="560" viewBox="0 0 1440 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CaspianG builds dynamic memory infrastructure</title>
  <desc id="desc">A modern monochrome GitHub profile banner for WaveMind and dynamic memory infrastructure.</desc>

