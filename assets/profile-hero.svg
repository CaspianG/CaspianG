        <text x="0" y="60" fill="#FFFFFF" font-size="32" font-weight="900">Stateful recall</text>
        <text x="0" y="90" fill="#B9C2D0" font-size="16" font-weight="650">Search finds candidates.</text>
        <text x="0" y="116" fill="#B9C2D0" font-size="16" font-weight="650">Memory state ranks what matters.</text>
