        <text x="0" y="58" fill="#FFFFFF" font-size="34" font-weight="900">dynamic recall</text>
        <text x="0" y="90" fill="#C8D0DC" font-size="16" font-weight="650">Search finds candidates.</text>
        <text x="0" y="116" fill="#C8D0DC" font-size="16" font-weight="650">Memory state decides what matters.</text>
      </g>

