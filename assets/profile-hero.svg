        <text x="0" y="60" fill="#FFFFFF" font-size="36" font-weight="900">dynamic memory</text>
        <text x="0" y="94" fill="#C8D0DC" font-size="16" font-weight="650">Similarity search finds candidates.</text>
        <text x="0" y="120" fill="#C8D0DC" font-size="16" font-weight="650">Memory state decides what matters now.</text>
      </g>

      <g transform="translate(74 178)">
