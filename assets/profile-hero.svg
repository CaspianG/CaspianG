<svg width="1440" height="560" viewBox="0 0 1440 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CaspianG builds WaveMind adaptive memory infrastructure</title>
  <desc id="desc">A black and white profile banner for CaspianG and WaveMind, showing adaptive memory as a clear system loop.</desc>

  <rect width="1440" height="560" rx="40" fill="#050505"/>
  <rect x="1.5" y="1.5" width="1437" height="557" rx="38.5" stroke="#272B33" stroke-width="3"/>

