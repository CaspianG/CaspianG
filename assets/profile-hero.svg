      <text x="0" y="132" fill="#FFFFFF" font-size="74" font-weight="900">Memory systems</text>
      <text x="0" y="208" fill="#FFFFFF" font-size="74" font-weight="900">that adapt</text>

      <text x="2" y="274" fill="#E9EEF7" font-size="25" font-weight="750">WaveMind turns retrieval into stateful memory.</text>
      <text x="2" y="312" fill="#AEB7C5" font-size="20" font-weight="650">Store context. Recall what matters. Forget what should fade.</text>

