      <text x="0" y="134" fill="#FFFFFF" font-size="76" font-weight="900">Memory that</text>
      <text x="0" y="208" fill="#FFFFFF" font-size="76" font-weight="900">changes with use</text>

      <text x="2" y="272" fill="#DDE3EC" font-size="24" font-weight="700">WaveMind is dynamic memory infrastructure for software</text>
      <text x="2" y="309" fill="#AAB2BF" font-size="21" font-weight="650">that has to remember, forget, adapt, and explain.</text>

