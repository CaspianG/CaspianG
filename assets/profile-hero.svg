<svg width="1440" height="560" viewBox="0 0 1440 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CaspianG builds adaptive memory infrastructure</title>
  <desc id="desc">A minimal black and white GitHub profile banner for adaptive memory infrastructure and WaveMind.</desc>

  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1440" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050505"/>
      <stop offset="0.54" stop-color="#0B0D11"/>
      <stop offset="1" stop-color="#111723"/>
    </linearGradient>
    <linearGradient id="line" x1="806" y1="114" x2="1328" y2="444" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.48" stop-color="#AEB8C8"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="cardShadow" x="-12%" y="-20%" width="124%" height="142%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="lineGlow" x="-20%" y="-40%" width="140%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#FFFFFF" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="1440" height="560" rx="38" fill="url(#surface)"/>
  <rect x="1.5" y="1.5" width="1437" height="557" rx="36.5" stroke="#222A36" stroke-width="3"/>

  <g opacity="0.12">
    <path d="M0 116H1440M0 228H1440M0 340H1440M0 452H1440" stroke="#FFFFFF"/>
    <path d="M136 0V560M272 0V560M408 0V560M544 0V560M680 0V560M816 0V560M952 0V560M1088 0V560M1224 0V560" stroke="#FFFFFF"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(84 72)">
      <rect width="142" height="38" rx="19" fill="#FFFFFF"/>
      <text x="71" y="25" text-anchor="middle" fill="#050505" font-size="12" font-weight="950" letter-spacing="1.7">CASPIANG</text>

      <text x="0" y="132" fill="#FFFFFF" font-size="80" font-weight="950">Adaptive</text>
      <text x="0" y="218" fill="#FFFFFF" font-size="80" font-weight="950">memory systems</text>

      <text x="2" y="292" fill="#D9DEE8" font-size="25" font-weight="760">I build infrastructure for software that needs</text>
      <text x="2" y="329" fill="#D9DEE8" font-size="25" font-weight="760">context, history, reliable recall, and controlled forgetting.</text>

      <g transform="translate(0 390)" font-size="13" font-weight="900">
        <rect width="136" height="42" rx="21" fill="#FFFFFF"/>
        <text x="68" y="27" text-anchor="middle" fill="#050505">WaveMind</text>

        <rect x="154" width="112" height="42" rx="21" fill="none" stroke="#6F7A8C" stroke-width="1.6"/>
        <text x="210" y="27" text-anchor="middle" fill="#FFFFFF">Python</text>

        <rect x="284" width="118" height="42" rx="21" fill="none" stroke="#6F7A8C" stroke-width="1.6"/>
        <text x="343" y="27" text-anchor="middle" fill="#FFFFFF">FastAPI</text>

        <rect x="420" width="152" height="42" rx="21" fill="none" stroke="#6F7A8C" stroke-width="1.6"/>
        <text x="496" y="27" text-anchor="middle" fill="#FFFFFF">Benchmarks</text>
      </g>
    </g>

    <g transform="translate(804 70)" filter="url(#cardShadow)">
      <rect width="536" height="420" rx="34" fill="#F8FAFC"/>
      <rect x="1.5" y="1.5" width="533" height="417" rx="32.5" stroke="#FFFFFF" stroke-width="3"/>

      <g transform="translate(42 38)">
        <text x="0" y="18" fill="#586273" font-size="12" font-weight="950" letter-spacing="1.8">WAVEMIND</text>
        <text x="0" y="70" fill="#050505" font-size="36" font-weight="950">Search is not memory.</text>
        <text x="0" y="104" fill="#303744" font-size="18" font-weight="760">Useful facts get stronger. Stale facts fade.</text>
        <text x="0" y="132" fill="#303744" font-size="18" font-weight="760">Corrections change what the system recalls next.</text>
      </g>

      <g transform="translate(54 162)" filter="url(#lineGlow)">
        <path d="M0 108C56 58 108 58 160 110C214 164 274 164 330 102C374 54 420 48 464 76" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
        <path d="M0 166C58 132 116 126 172 162C230 200 286 184 338 132C386 84 428 82 464 108" stroke="#050505" stroke-width="3" stroke-linecap="round" opacity="0.22"/>
        <circle cx="0" cy="108" r="10" fill="#050505"/>
        <circle cx="160" cy="110" r="12" fill="#050505"/>
        <circle cx="330" cy="102" r="12" fill="#050505"/>
        <circle cx="464" cy="76" r="10" fill="#050505"/>
      </g>

      <g transform="translate(50 300)" font-size="13" font-weight="950">
        <rect width="96" height="38" rx="19" fill="#050505"/>
        <text x="48" y="25" text-anchor="middle" fill="#FFFFFF">store</text>

        <rect x="112" width="98" height="38" rx="19" fill="#E9EEF6"/>
        <text x="161" y="25" text-anchor="middle" fill="#050505">search</text>

        <rect x="226" width="92" height="38" rx="19" fill="#E9EEF6"/>
        <text x="272" y="25" text-anchor="middle" fill="#050505">state</text>

        <rect x="334" width="96" height="38" rx="19" fill="#050505"/>
        <text x="382" y="25" text-anchor="middle" fill="#FFFFFF">recall</text>
      </g>

      <g transform="translate(50 356)" font-size="12" font-weight="850">
        <text x="0" y="20" fill="#586273">hotness</text>
        <text x="92" y="20" fill="#586273">decay</text>
        <text x="168" y="20" fill="#586273">TTL</text>
        <text x="218" y="20" fill="#586273">feedback</text>
        <text x="320" y="20" fill="#586273">corrections</text>
      </g>
    </g>
  </g>
</svg>
