    <rect x="408" width="160" height="40" rx="20" fill="#FFFFFF" stroke="#111111" stroke-opacity="0.24" stroke-width="2"/>
    <text x="488" y="26" text-anchor="middle" fill="#111111">CLI</text>

    <rect x="588" width="198" height="40" rx="20" fill="#FFFFFF" stroke="#111111" stroke-opacity="0.24" stroke-width="2"/>
    <text x="687" y="26" text-anchor="middle" fill="#111111">LangChain</text>

    <rect x="806" width="198" height="40" rx="20" fill="#FFFFFF" stroke="#111111" stroke-opacity="0.24" stroke-width="2"/>
    <text x="905" y="26" text-anchor="middle" fill="#111111">LlamaIndex</text>

    <rect x="1024" width="244" height="40" rx="20" fill="#FFFFFF" stroke="#111111" stroke-opacity="0.24" stroke-width="2"/>
    <text x="1146" y="26" text-anchor="middle" fill="#111111">benchmark artifacts</text>
  </g>
