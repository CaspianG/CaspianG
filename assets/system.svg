<svg width="1440" height="470" viewBox="0 0 1440 470" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WaveMind memory system map</title>
  <desc id="desc">A black and white system map showing persistent memory, candidate retrieval, adaptive field dynamics, graph recall, APIs, and benchmarks.</desc>

  <rect width="1440" height="470" rx="30" fill="#FFFFFF"/>
  <rect x="1.5" y="1.5" width="1437" height="467" rx="28.5" stroke="#111111" stroke-opacity="0.14" stroke-width="3"/>

  <text x="72" y="76" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="860">From stored facts to adaptive memory</text>
  <text x="72" y="116" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="520">Durable state stays inspectable. Recall changes with use, feedback, age, graph links, and evidence.</text>

  <g transform="translate(72 166)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect width="182" height="144" rx="24" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="28" y="50" fill="#111111" font-size="22" font-weight="850">Source</text>
    <text x="28" y="82" fill="#555555" font-size="14">SQLite</text>
    <text x="28" y="108" fill="#555555" font-size="14">metadata</text>
    <text x="28" y="132" fill="#555555" font-size="14">namespaces</text>
  </g>

  <path d="M284 238H340" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  <path d="M326 225L344 238L326 251" stroke="#111111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(378 146)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect width="198" height="184" rx="26" fill="#111111"/>
    <text x="30" y="56" fill="#FFFFFF" font-size="22" font-weight="850">Index</text>
    <text x="30" y="92" fill="#DADADD" font-size="14">vectors</text>
    <text x="30" y="118" fill="#DADADD" font-size="14">FAISS / Annoy</text>
    <text x="30" y="144" fill="#DADADD" font-size="14">top-k candidates</text>
  </g>

  <path d="M606 238H662" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  <path d="M648 225L666 238L648 251" stroke="#111111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(700 146)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect width="214" height="184" rx="26" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="30" y="56" fill="#111111" font-size="22" font-weight="850">Field</text>
    <text x="30" y="92" fill="#555555" font-size="14">hotness</text>
    <text x="30" y="118" fill="#555555" font-size="14">decay</text>
    <text x="30" y="144" fill="#555555" font-size="14">feedback</text>
  </g>

  <path d="M944 238H1000" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  <path d="M986 225L1004 238L986 251" stroke="#111111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(1038 146)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect width="182" height="184" rx="26" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="30" y="56" fill="#111111" font-size="22" font-weight="850">Graph</text>
    <text x="30" y="92" fill="#555555" font-size="14">links</text>
    <text x="30" y="118" fill="#555555" font-size="14">clusters</text>
    <text x="30" y="144" fill="#555555" font-size="14">recall paths</text>
  </g>

  <path d="M1250 238H1298" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  <path d="M1284 225L1302 238L1284 251" stroke="#111111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(1330 176)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect width="54" height="124" rx="27" fill="#111111"/>
    <text x="27" y="74" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="850" transform="rotate(-90 27 74)">recall</text>
  </g>

  <g transform="translate(72 374)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="760">
    <rect width="190" height="40" rx="20" fill="#111111"/>
