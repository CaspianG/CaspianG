<svg width="1440" height="460" viewBox="0 0 1440 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CaspianG GitHub profile banner</title>
  <desc id="desc">A dark modern WaveMind banner showing dynamic memory infrastructure for adaptive software.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071017"/>
      <stop offset="0.45" stop-color="#0B0F18"/>
      <stop offset="1" stop-color="#101522"/>
    </linearGradient>
    <linearGradient id="accent" x1="108" y1="64" x2="1304" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39D0FF"/>
      <stop offset="0.48" stop-color="#7CFFB2"/>
      <stop offset="1" stop-color="#FFD166"/>
    </linearGradient>
    <linearGradient id="panel" x1="850" y1="78" x2="1322" y2="354" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1440" height="460" rx="34" fill="url(#bg)"/>
  <rect x="1" y="1" width="1438" height="458" rx="33" stroke="#FFFFFF" stroke-opacity="0.11" stroke-width="2"/>

  <g opacity="0.12">
    <path d="M120 0V460M240 0V460M360 0V460M480 0V460M600 0V460M720 0V460M840 0V460M960 0V460M1080 0V460M1200 0V460M1320 0V460" stroke="#FFFFFF"/>
    <path d="M0 92H1440M0 184H1440M0 276H1440M0 368H1440" stroke="#FFFFFF"/>
  </g>

  <path d="M74 326C190 228 304 228 430 292C566 362 690 346 836 244C972 150 1116 137 1250 220C1320 263 1376 274 1434 266" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M74 276C190 178 304 178 430 242C566 312 690 296 836 194C972 100 1116 87 1250 170C1320 213 1376 224 1434 216" stroke="url(#accent)" stroke-opacity="0.54" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M74 226C190 128 304 128 430 192C566 262 690 246 836 144C972 50 1116 37 1250 120C1320 163 1376 174 1434 166" stroke="url(#accent)" stroke-opacity="0.32" stroke-width="2" stroke-linecap="round"/>

  <path d="M88 332C230 224 352 246 492 314C630 380 764 342 890 252C1016 162 1130 148 1264 225" stroke="url(#accent)" stroke-opacity="0.26" stroke-width="18" filter="url(#soft)"/>

  <g transform="translate(88 68)">
    <rect width="126" height="126" rx="30" fill="#F8FAFC"/>
    <circle cx="63" cy="63" r="42" fill="#071017"/>
    <path d="M49 35C42 48 39 57 39 64C39 72 42 81 49 94" stroke="#F8FAFC" stroke-width="6" stroke-linecap="round"/>
    <path d="M77 35C84 48 87 57 87 64C87 72 84 81 77 94" stroke="#F8FAFC" stroke-width="6" stroke-linecap="round"/>
    <path d="M36 64H90" stroke="#F8FAFC" stroke-width="6" stroke-linecap="round"/>
  </g>

  <text x="88" y="266" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="86" font-weight="820" letter-spacing="0">CaspianG</text>
  <text x="92" y="320" fill="#D8E2EA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="560" letter-spacing="0">WaveMind / dynamic memory infrastructure</text>
  <text x="94" y="358" fill="#93A4B7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="500" letter-spacing="0">agents that remember, adapt, decay, consolidate, and stay useful</text>

  <g transform="translate(850 76)">
    <rect width="472" height="278" rx="30" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.17"/>
    <text x="34" y="54" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="760" letter-spacing="0">Memory OS loop</text>
    <text x="34" y="86" fill="#AFC0D1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="0">store -> recall -> reinforce -> decay -> consolidate</text>

    <g transform="translate(36 122)">
      <rect x="0" y="0" width="86" height="58" rx="18" fill="#FFFFFF" fill-opacity="0.13" stroke="#FFFFFF" stroke-opacity="0.20"/>
      <text x="43" y="35" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="780">store</text>
      <path d="M96 29H130" stroke="#7CFFB2" stroke-width="3" stroke-linecap="round"/>
      <path d="M123 20L133 29L123 38" stroke="#7CFFB2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

      <rect x="144" y="0" width="86" height="58" rx="18" fill="#FFFFFF" fill-opacity="0.13" stroke="#FFFFFF" stroke-opacity="0.20"/>
      <text x="187" y="35" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="780">recall</text>
      <path d="M240 29H274" stroke="#39D0FF" stroke-width="3" stroke-linecap="round"/>
      <path d="M267 20L277 29L267 38" stroke="#39D0FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

      <rect x="288" y="0" width="108" height="58" rx="18" fill="#FFFFFF" fill-opacity="0.13" stroke="#FFFFFF" stroke-opacity="0.20"/>
      <text x="342" y="35" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="780">adapt</text>
    </g>

    <g transform="translate(34 218)">
      <rect width="98" height="32" rx="16" fill="#39D0FF" fill-opacity="0.16" stroke="#39D0FF" stroke-opacity="0.34"/>
      <text x="49" y="21" text-anchor="middle" fill="#D9F7FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="720">local-first</text>
      <rect x="112" width="112" height="32" rx="16" fill="#7CFFB2" fill-opacity="0.14" stroke="#7CFFB2" stroke-opacity="0.32"/>
      <text x="168" y="21" text-anchor="middle" fill="#E4FFEF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="720">benchmarked</text>
      <rect x="238" width="104" height="32" rx="16" fill="#FFD166" fill-opacity="0.14" stroke="#FFD166" stroke-opacity="0.32"/>
      <text x="290" y="21" text-anchor="middle" fill="#FFF2CD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="720">production</text>
      <rect x="356" width="74" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.22"/>
      <text x="393" y="21" text-anchor="middle" fill="#E7EEF7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="720">agents</text>
    </g>
