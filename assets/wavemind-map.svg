<svg width="1440" height="560" viewBox="0 0 1440 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WaveMind system map</title>
  <desc id="desc">A visual map of WaveMind memory infrastructure: application input, Memory OS, production runtime, benchmarks, and outputs.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1018"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="blue" x1="105" y1="120" x2="1290" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39D0FF"/>
      <stop offset="0.5" stop-color="#7CFFB2"/>
      <stop offset="1" stop-color="#FFD166"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="560" rx="32" fill="url(#bg)"/>
  <rect x="1" y="1" width="1438" height="558" rx="31" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2"/>

  <g opacity="0.09">
    <path d="M120 0V560M240 0V560M360 0V560M480 0V560M600 0V560M720 0V560M840 0V560M960 0V560M1080 0V560M1200 0V560M1320 0V560" stroke="#FFFFFF"/>
    <path d="M0 112H1440M0 224H1440M0 336H1440M0 448H1440" stroke="#FFFFFF"/>
  </g>

  <text x="72" y="74" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">WaveMind as a memory layer</text>
  <text x="72" y="108" fill="#AEB8C6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">From raw events to useful recall, with policy, lifecycle, and production controls around retrieval.</text>

  <g transform="translate(72 158)">
    <rect width="246" height="250" rx="24" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="28" y="48" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="760">Inputs</text>
    <text x="28" y="84" fill="#B9C5D3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">agent context</text>
    <text x="28" y="112" fill="#B9C5D3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">user preferences</text>
    <text x="28" y="140" fill="#B9C5D3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">corrections</text>
    <text x="28" y="168" fill="#B9C5D3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">events and notes</text>
    <rect x="28" y="194" width="140" height="34" rx="17" fill="#39D0FF" fill-opacity="0.16" stroke="#39D0FF" stroke-opacity="0.34"/>
    <text x="98" y="216" text-anchor="middle" fill="#D9F7FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="720">remember()</text>
  </g>

  <path d="M346 282H444" stroke="url(#blue)" stroke-width="4" stroke-linecap="round"/>
  <path d="M432 270L448 282L432 294" stroke="#7CFFB2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(470 126)">
    <rect width="500" height="314" rx="30" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.17"/>
    <text x="34" y="54" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Memory OS</text>
    <text x="34" y="86" fill="#AEB8C6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Policy around retrieval: what matters now, what fades, what should be consolidated.</text>

    <g transform="translate(34 126)">
      <rect width="194" height="64" rx="18" fill="#39D0FF" fill-opacity="0.13" stroke="#39D0FF" stroke-opacity="0.32"/>
      <text x="22" y="28" fill="#E6FAFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="760">priority</text>
      <text x="22" y="48" fill="#A9DCEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">hotness, decay, TTL</text>
    </g>
    <g transform="translate(270 126)">
      <rect width="194" height="64" rx="18" fill="#7CFFB2" fill-opacity="0.12" stroke="#7CFFB2" stroke-opacity="0.30"/>
      <text x="22" y="28" fill="#E8FFF0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="760">prefetch</text>
      <text x="22" y="48" fill="#B6EBCB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">warm likely recalls</text>
    </g>
    <g transform="translate(34 212)">
      <rect width="194" height="64" rx="18" fill="#FFD166" fill-opacity="0.12" stroke="#FFD166" stroke-opacity="0.30"/>
      <text x="22" y="28" fill="#FFF3D4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="760">consolidate</text>
      <text x="22" y="48" fill="#E9D3A2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">higher-level memory</text>
    </g>
    <g transform="translate(270 212)">
      <rect width="194" height="64" rx="18" fill="#FFFFFF" fill-opacity="0.09" stroke="#FFFFFF" stroke-opacity="0.18"/>
      <text x="22" y="28" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="760">forget</text>
      <text x="22" y="48" fill="#B9C5D3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">expire stale facts</text>
    </g>
  </g>

  <path d="M998 282H1094" stroke="url(#blue)" stroke-width="4" stroke-linecap="round"/>
  <path d="M1082 270L1098 282L1082 294" stroke="#FFD166" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(1122 158)">
    <rect width="246" height="250" rx="24" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="28" y="48" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="760">Runtime</text>
    <text x="28" y="84" fill="#B9C5D3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">FastAPI service</text>
    <text x="28" y="112" fill="#B9C5D3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">SQLite / Postgres</text>
    <text x="28" y="140" fill="#B9C5D3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Redis cache</text>
    <text x="28" y="168" fill="#B9C5D3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">cluster repair</text>
    <rect x="28" y="194" width="140" height="34" rx="17" fill="#FFD166" fill-opacity="0.16" stroke="#FFD166" stroke-opacity="0.34"/>
    <text x="98" y="216" text-anchor="middle" fill="#FFF2CD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="720">query()</text>
  </g>

  <g transform="translate(72 462)">
    <rect width="296" height="54" rx="18" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="24" y="34" fill="#DCE8F6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="720">local-first by default</text>
  </g>
  <g transform="translate(400 462)">
    <rect width="296" height="54" rx="18" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="24" y="34" fill="#DCE8F6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="720">production path when needed</text>
  </g>
  <g transform="translate(728 462)">
    <rect width="296" height="54" rx="18" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="24" y="34" fill="#DCE8F6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="720">benchmarked, not guessed</text>
  </g>
  <g transform="translate(1056 462)">
    <rect width="312" height="54" rx="18" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="24" y="34" fill="#DCE8F6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="720">agent memory, not document search</text>
  </g>
</svg>
