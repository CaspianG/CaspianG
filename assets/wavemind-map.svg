<svg width="1440" height="430" viewBox="0 0 1440 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WaveMind memory loop</title>
  <desc id="desc">Minimal black on white map showing WaveMind turning events into evolving memory.</desc>

  <rect width="1440" height="430" rx="28" fill="#FFFFFF"/>
  <rect x="1" y="1" width="1438" height="428" rx="27" stroke="#111111" stroke-opacity="0.16" stroke-width="2"/>

  <text x="72" y="76" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="820">WaveMind memory loop</text>
  <text x="72" y="112" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">Store facts, score their usefulness, reinforce what works, and let stale memory fade.</text>

  <g transform="translate(72 166)">
    <rect width="236" height="138" rx="22" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="28" y="48" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="820">Input</text>
    <text x="28" y="82" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">messages</text>
    <text x="28" y="110" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">facts / events</text>
  </g>

  <path d="M344 235H438" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  <path d="M426 222L442 235L426 248" stroke="#111111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(474 138)">
    <rect width="492" height="194" rx="28" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="34" y="52" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="850">Dynamic memory</text>
    <text x="34" y="84" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">retrieval plus lifecycle policy</text>

    <g transform="translate(34 116)">
      <rect width="100" height="46" rx="16" fill="#111111"/>
      <text x="50" y="29" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="820">priority</text>
      <rect x="120" width="88" height="46" rx="16" fill="#FFFFFF" stroke="#111111" stroke-width="1.8"/>
      <text x="164" y="29" text-anchor="middle" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="820">decay</text>
      <rect x="228" width="82" height="46" rx="16" fill="#FFFFFF" stroke="#111111" stroke-width="1.8"/>
      <text x="269" y="29" text-anchor="middle" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="820">TTL</text>
      <rect x="330" width="120" height="46" rx="16" fill="#FFFFFF" stroke="#111111" stroke-width="1.8"/>
      <text x="390" y="29" text-anchor="middle" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="820">namespace</text>
    </g>
  </g>

  <path d="M1000 235H1094" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  <path d="M1082 222L1098 235L1082 248" stroke="#111111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(1132 166)">
    <rect width="236" height="138" rx="22" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="28" y="48" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="820">Output</text>
    <text x="28" y="82" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">useful recall</text>
    <text x="28" y="110" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">fresh context</text>
  </g>

  <path d="M1178 336C1000 390 780 388 602 340C506 314 414 318 306 350" stroke="#111111" stroke-opacity="0.35" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 14"/>
  <text x="546" y="388" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="650">feedback reinforces useful memories and lets stale ones fade</text>
</svg>
