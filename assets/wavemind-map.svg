<svg width="1440" height="450" viewBox="0 0 1440 450" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WaveMind adaptive memory loop</title>
  <desc id="desc">A minimal black and white diagram showing how WaveMind turns stored context into adaptive memory.</desc>

  <rect width="1440" height="450" rx="30" fill="#FFFFFF"/>
  <rect x="1" y="1" width="1438" height="448" rx="29" stroke="#111111" stroke-opacity="0.14" stroke-width="2"/>

  <text x="72" y="74" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="850">WaveMind in one loop</text>
  <text x="72" y="116" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="520">Store facts, retrieve candidates, adapt priority, explain why memory was recalled.</text>

  <g transform="translate(72 166)">
    <rect width="184" height="132" rx="22" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="28" y="49" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">Ingest</text>
    <text x="28" y="83" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">facts</text>
    <text x="28" y="108" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">events, files, chats</text>
  </g>

  <path d="M286 232H344" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  <path d="M330 219L348 232L330 245" stroke="#111111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(380 146)">
    <rect width="208" height="172" rx="24" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="30" y="54" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">Persist</text>
    <text x="30" y="90" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">SQLite source</text>
    <text x="30" y="116" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">TTL, tags</text>
    <text x="30" y="142" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">namespaces</text>
  </g>

  <path d="M618 232H676" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  <path d="M662 219L680 232L662 245" stroke="#111111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(712 146)">
    <rect width="208" height="172" rx="24" fill="#111111"/>
    <text x="30" y="54" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">Retrieve</text>
    <text x="30" y="90" fill="#DADADD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">vector search</text>
    <text x="30" y="116" fill="#DADADD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">ANN backends</text>
    <text x="30" y="142" fill="#DADADD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">top-k candidates</text>
  </g>

  <path d="M950 232H1008" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  <path d="M994 219L1012 232L994 245" stroke="#111111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(1044 146)">
    <rect width="156" height="172" rx="24" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="30" y="54" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">Adapt</text>
    <text x="30" y="90" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">hotness</text>
    <text x="30" y="116" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">decay</text>
    <text x="30" y="142" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">feedback</text>
  </g>

  <path d="M1230 232H1288" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  <path d="M1274 219L1292 232L1274 245" stroke="#111111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(1324 166)">
    <rect width="44" height="132" rx="22" fill="#111111"/>
    <text x="22" y="76" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="850" transform="rotate(-90 22 76)">recall</text>
  </g>

  <path d="M1218 348C1036 400 754 402 552 350C420 316 306 322 162 365" stroke="#111111" stroke-opacity="0.32" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 14"/>
  <text x="408" y="398" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="650">useful memory gets stronger; stale or corrected memory loses priority</text>
</svg>
