<svg width="1440" height="440" viewBox="0 0 1440 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WaveMind memory loop</title>
  <desc id="desc">A minimal black and white diagram showing WaveMind as durable storage, retrieval, memory dynamics, and feedback.</desc>

  <rect width="1440" height="440" rx="30" fill="#FFFFFF"/>
  <rect x="1" y="1" width="1438" height="438" rx="29" stroke="#111111" stroke-opacity="0.14" stroke-width="2"/>

  <text x="72" y="76" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="850">WaveMind in one loop</text>
  <text x="72" y="116" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="520">Durable memory, candidate retrieval, adaptive priority, and clean forgetting.</text>

  <g transform="translate(72 164)">
    <rect width="198" height="126" rx="22" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="28" y="48" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">Remember</text>
    <text x="28" y="82" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">messages</text>
    <text x="28" y="106" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">facts, events, files</text>
  </g>

  <path d="M304 228H374" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  <path d="M360 215L378 228L360 241" stroke="#111111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(410 144)">
    <rect width="236" height="166" rx="24" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="30" y="53" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">Source of truth</text>
    <text x="30" y="88" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">SQLite metadata</text>
    <text x="30" y="114" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">TTL, tags, namespaces</text>
    <text x="30" y="140" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">provenance attached</text>
  </g>

  <path d="M680 228H750" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  <path d="M736 215L754 228L736 241" stroke="#111111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(786 144)">
    <rect width="236" height="166" rx="24" fill="#111111"/>
    <text x="30" y="53" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">Find candidates</text>
    <text x="30" y="88" fill="#D9D9DC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">vector search / ANN</text>
    <text x="30" y="114" fill="#D9D9DC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">fast top-k recall</text>
    <text x="30" y="140" fill="#D9D9DC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">FAISS, Qdrant, pgvector</text>
  </g>

  <path d="M1056 228H1126" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  <path d="M1112 215L1130 228L1112 241" stroke="#111111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(1162 144)">
    <rect width="206" height="166" rx="24" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="30" y="53" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">Adapt</text>
    <text x="30" y="88" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">hotness, decay</text>
    <text x="30" y="114" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">feedback, priority</text>
    <text x="30" y="140" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">stale facts fade</text>
  </g>

  <path d="M1268 336C1094 392 818 396 610 344C486 313 358 318 214 362" stroke="#111111" stroke-opacity="0.32" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 14"/>
  <text x="438" y="394" fill="#555555" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="650">useful memory gets stronger; stale or corrected memory loses priority</text>
</svg>
