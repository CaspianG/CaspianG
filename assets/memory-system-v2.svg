<svg width="1440" height="430" viewBox="0 0 1440 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WaveMind memory system diagram</title>
  <desc id="desc">A monochrome diagram showing how WaveMind turns retrieval into adaptive memory recall.</desc>

  <rect x="1.5" y="1.5" width="1437" height="427" rx="32.5" fill="#FFFFFF" stroke="#D9DCE2" stroke-width="3"/>

  <text x="76" y="88" fill="#07080A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="40" font-weight="850">From search to memory</text>
  <text x="78" y="122" fill="#555963" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="650">Search finds candidates. Memory state decides what should still matter.</text>

  <g transform="translate(76 174)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="0" y="0" width="232" height="138" rx="24" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="28" y="50" fill="#111111" font-size="25" font-weight="850">Remember</text>
    <text x="28" y="86" fill="#555963" font-size="16" font-weight="650">facts, docs, events</text>
    <text x="28" y="113" fill="#555963" font-size="16" font-weight="650">tags and namespaces</text>

    <path d="M259 69H330M330 69L312 51M330 69L312 87" stroke="#111111" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="358" y="0" width="232" height="138" rx="24" fill="#111111"/>
    <text x="386" y="50" fill="#FFFFFF" font-size="25" font-weight="850">Retrieve</text>
    <text x="386" y="86" fill="#C9CCD3" font-size="16" font-weight="650">ANN or exact search</text>
    <text x="386" y="113" fill="#C9CCD3" font-size="16" font-weight="650">fast candidate set</text>

    <path d="M617 69H688M688 69L670 51M688 69L670 87" stroke="#111111" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="716" y="0" width="232" height="138" rx="24" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="744" y="50" fill="#111111" font-size="25" font-weight="850">Adapt</text>
    <text x="744" y="86" fill="#555963" font-size="16" font-weight="650">decay, hotness, TTL</text>
    <text x="744" y="113" fill="#555963" font-size="16" font-weight="650">feedback and graph links</text>

    <path d="M975 69H1046M1046 69L1028 51M1046 69L1028 87" stroke="#111111" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="1074" y="0" width="232" height="138" rx="24" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <text x="1102" y="50" fill="#111111" font-size="25" font-weight="850">Explain</text>
    <text x="1102" y="86" fill="#555963" font-size="16" font-weight="650">ranked evidence</text>
    <text x="1102" y="113" fill="#555963" font-size="16" font-weight="650">scores and provenance</text>
  </g>

  <g transform="translate(250 344)">
    <path d="M0 0C111 -36 224 -36 336 0C448 36 560 36 672 0C784 -36 896 -36 1008 0" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="7" fill="#111111"/>
    <circle cx="336" cy="0" r="7" fill="#111111"/>
    <circle cx="672" cy="0" r="7" fill="#111111"/>
    <circle cx="1008" cy="0" r="7" fill="#111111"/>
  </g>

  <rect x="410" y="382" width="620" height="30" rx="15" fill="#F3F4F6"/>
  <text x="720" y="403" text-anchor="middle" fill="#555963" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="750">useful memories gain priority; stale or corrected memories fade</text>
</svg>
